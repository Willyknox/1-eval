<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <script defer src="login.js"></script>
</head>
<style>
  body {
    background: hsl(60, 43%, 69%);
  }
  h2 {
      font-size: 2.2rem;
      font-weight: 700;
      color: #343a40;
      margin-bottom: 28px;
      text-align: left;
    }
    form{
      font-size: 1.0 rem;
      font-weight: 300;
      color: #343a40;
      margin-bottom: 20px;
      text-align: center;
      background-color: azure;
      max-width: 20% ;
      max-height: max-content;
      padding: 10px 20px;
    }
    button {
  text-decoration: none;
  padding: 0.5rem ;
  border: 4px solid #0d0101;
  background-color: rgb(194, 194, 194);
  font-style: italic;
  font-palette: dark ;
}
  </style>
<body>
  <h2>Iniciar Sesión</h2>
  <form id="loginForm">
    <label for="username">Usuario:</label>
    <input type="text" id="username" name="username" required><br><br>
    <label for="password">Contraseña:</label>
    <input type="password" id="password" name="password" required><br><br>
    <button type="submit">Entrar</button>
  </form>
  <section id="apod">
    <h2 id="photoTitle">Loading...</h2>
    <img id="photoURL" alt="NASA Photo of the Day">
    <p id="photoExplanation"></p>
</section>
  <div id="loginMessage"></div>
</body>
</html>
